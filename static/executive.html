<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>経営ダッシュボード - 彦田ブルー（仮名前）</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-layout">
    <div class="main-content">
      <div class="max-w-7xl mx-auto space-y-8">
        <!-- ヘッダー -->
        <div class="animate-on-load">
          <h1 class="text-4xl font-bold mb-2">経営ダッシュボード</h1>
          <p class="text-gray-600">オフィス活用状況の分析</p>
        </div>

        <!-- データタイプ選択 -->
        <div class="animate-on-load card-ocean">
          <h2 class="text-xl font-bold mb-4">表示データ選択</h2>
          <div class="grid grid-cols-1 md-grid-cols-3 gap-4">
            <button class="data-type-btn active-ocean" id="btn-attendance" onclick="selectDataType('attendance')">
              <div class="btn-icon">👥</div>
              <span>出社率</span>
            </button>
            <button class="data-type-btn" id="btn-spaceLoad" onclick="selectDataType('spaceLoad')">
              <div class="btn-icon">📊</div>
              <span>空間負荷率</span>
            </button>
            <button class="data-type-btn" id="btn-lunch" onclick="selectDataType('lunch')">
              <div class="btn-icon">📈</div>
              <span>ランチ回数</span>
            </button>
          </div>
        </div>

        <!-- フィルター -->
        <div class="animate-on-load card-ocean">
          <div class="flex items-center gap-3 mb-4">
            <span style="color:var(--ocean-medium);font-size:1.5rem">🔍</span>
            <h2 class="text-xl font-bold">絞り込み</h2>
          </div>
          <div class="grid grid-cols-2 md-grid-cols-4 gap-3">
            <button class="filter-btn active" id="filter-daily" onclick="selectFilter('daily')">日別</button>
            <button class="filter-btn" id="filter-weekly" onclick="selectFilter('weekly')">曜日別</button>
            <button class="filter-btn" id="filter-monthly" onclick="selectFilter('monthly')">月別</button>
            <button class="filter-btn" id="filter-yearly" onclick="selectFilter('yearly')">年別</button>
          </div>
        </div>

        <!-- グラフ -->
        <div class="animate-on-load card-ocean">
          <div class="flex items-center gap-3 mb-6">
            <span style="color:var(--ocean-medium);font-size:2rem" id="chartIcon">👥</span>
            <h2 class="text-2xl font-bold" id="chartTitle">出社率の推移</h2>
          </div>

          <!-- チャートエリア -->
          <div class="chart-area">
            <div class="chart-y-axis" id="yAxis"></div>
            <div class="chart-body">
              <div class="chart-grid-line" style="top:0%"></div>
              <div class="chart-grid-line" style="top:25%"></div>
              <div class="chart-grid-line" style="top:50%"></div>
              <div class="chart-grid-line" style="top:75%"></div>
              <div class="chart-grid-line" style="top:100%"></div>
              <svg class="chart-svg" id="chartSvg" viewBox="0 0 1000 400" preserveAspectRatio="none">
                <defs>
                  <linearGradient id="lineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#0891b2"/>
                    <stop offset="100%" stop-color="#0e7490"/>
                  </linearGradient>
                  <linearGradient id="areaGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="#0891b2" stop-opacity="0.3"/>
                    <stop offset="100%" stop-color="#0891b2" stop-opacity="0"/>
                  </linearGradient>
                </defs>
                <path id="areaPath" fill="url(#areaGradient)"/>
                <path id="linePath" fill="none" stroke="url(#lineGradient)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke"/>
                <g id="dataPoints"></g>
              </svg>
            </div>
          </div>
          <div class="chart-x-axis" id="xAxis"></div>

          <!-- 統計サマリー -->
          <div class="grid grid-cols-1 md-grid-cols-3 gap-4 mt-6" id="statsCards"></div>

          <!-- データテーブル -->
          <div class="data-table-scroll" id="dataTableScroll">
            <table class="data-table">
              <thead>
                <tr><th>期間</th><th>値</th></tr>
              </thead>
              <tbody id="dataTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/common.js"></script>
  <script>
    if (!checkAuth()) { /* redirected */ }
    renderSidebar('executive');

    let currentDataType = 'attendance';
    let currentFilter = 'daily';

    const dataTypeConfig = {
      attendance: { label: '出社率', unit: '%', icon: '👥', activeClass: 'active-ocean', color: 'from-ocean-medium to-ocean-deep' },
      spaceLoad: { label: '空間負荷率', unit: '%', icon: '📊', activeClass: 'active-coral', color: 'from-coral-orange to-coral-pink' },
      lunch: { label: 'ランチ回数', unit: '回', icon: '📈', activeClass: 'active-green', color: 'from-green-500 to-green-600' },
    };

    const colorMap = {
      attendance: 'background:linear-gradient(135deg,var(--ocean-medium),var(--ocean-deep))',
      spaceLoad: 'background:linear-gradient(135deg,var(--coral-orange),var(--coral-pink))',
      lunch: 'background:linear-gradient(135deg,var(--green-500),var(--green-600))',
    };

    function generateData(dataType, filterType) {
      const counts = { daily: 30, weekly: 12, monthly: 12, yearly: 5 };
      const labels = {
        daily: i => (i+1)+'日',
        weekly: i => '第'+(i+1)+'週',
        monthly: i => (i+1)+'月',
        yearly: i => (2020+i)+'年',
      };
      const count = counts[filterType];
      const data = [];
      for (let i = 0; i < count; i++) {
        let value;
        if (dataType === 'attendance') value = 50 + Math.random() * 30;
        else if (dataType === 'spaceLoad') value = 40 + Math.random() * 40;
        else value = 10 + Math.random() * 20;
        data.push({ label: labels[filterType](i), value: Math.round(value * 10) / 10 });
      }
      return data;
    }

    function selectDataType(type) {
      currentDataType = type;
      // ボタン更新
      ['attendance','spaceLoad','lunch'].forEach(t => {
        const btn = document.getElementById('btn-'+t);
        btn.className = 'data-type-btn' + (t === type ? ' ' + dataTypeConfig[t].activeClass : '');
      });
      renderChart();
    }

    function selectFilter(filter) {
      currentFilter = filter;
      ['daily','weekly','monthly','yearly'].forEach(f => {
        const btn = document.getElementById('filter-'+f);
        btn.className = 'filter-btn' + (f === filter ? ' active' : '');
      });
      renderChart();
    }

    function renderChart() {
      const config = dataTypeConfig[currentDataType];
      const data = generateData(currentDataType, currentFilter);
      const maxValue = Math.max(...data.map(d => d.value));

      document.getElementById('chartIcon').textContent = config.icon;
      document.getElementById('chartTitle').textContent = config.label + 'の推移';

      // Y軸
      const yAxis = document.getElementById('yAxis');
      yAxis.innerHTML = '';
      [100, 75, 50, 25, 0].forEach(p => {
        const span = document.createElement('span');
        span.textContent = Math.ceil(maxValue * p / 100) + config.unit;
        yAxis.appendChild(span);
      });

      // SVGパス
      const points = data.map((d, i) => ({
        x: data.length > 1 ? (i / (data.length - 1)) * 1000 : 500,
        y: 400 - (d.value / maxValue) * 400,
      }));

      const lineD = points.map((p, i) => (i === 0 ? 'M' : 'L') + ' ' + p.x + ',' + p.y).join(' ');
      document.getElementById('linePath').setAttribute('d', lineD);

      const areaD = lineD + ' L 1000,400 L 0,400 Z';
      document.getElementById('areaPath').setAttribute('d', areaD);

      // データポイント
      const pointsG = document.getElementById('dataPoints');
      pointsG.innerHTML = '';
      points.forEach((p, i) => {
        const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        circle.setAttribute('cx', p.x);
        circle.setAttribute('cy', p.y);
        circle.setAttribute('r', '8');
        circle.setAttribute('fill', '#0891b2');
        circle.setAttribute('stroke', 'white');
        circle.setAttribute('stroke-width', '3');
        circle.setAttribute('vector-effect', 'non-scaling-stroke');
        circle.style.cursor = 'pointer';

        const title = document.createElementNS('http://www.w3.org/2000/svg', 'title');
        title.textContent = data[i].label + ': ' + data[i].value + config.unit;
        circle.appendChild(title);
        pointsG.appendChild(circle);
      });

      // X軸ラベル
      const xAxis = document.getElementById('xAxis');
      const step = Math.ceil(data.length / 8);
      const filteredLabels = data.filter((_, i) => i % step === 0 || i === data.length - 1);
      xAxis.innerHTML = filteredLabels.map(d => '<span>' + d.label + '</span>').join('');

      // 統計
      const avg = (data.reduce((s, d) => s + d.value, 0) / data.length).toFixed(1);
      const max = Math.max(...data.map(d => d.value)).toFixed(1);
      const min = Math.min(...data.map(d => d.value)).toFixed(1);
      const bgStyle = colorMap[currentDataType];

      document.getElementById('statsCards').innerHTML = `
        <div class="stat-card" style="${bgStyle}">
          <div class="stat-label">平均値</div>
          <div class="stat-value">${avg}${config.unit}</div>
        </div>
        <div class="stat-card" style="${bgStyle}">
          <div class="stat-label">最大値</div>
          <div class="stat-value">${max}${config.unit}</div>
        </div>
        <div class="stat-card" style="${bgStyle}">
          <div class="stat-label">最小値</div>
          <div class="stat-value">${min}${config.unit}</div>
        </div>
      `;

      // テーブル
      document.getElementById('dataTableBody').innerHTML = data.map((d, i) =>
        `<tr style="background:${i % 2 === 0 ? 'white' : 'var(--gray-50)'}"><td>${d.label}</td><td>${d.value}${config.unit}</td></tr>`
      ).join('');
    }

    renderChart();
  </script>
</body>
</html>
