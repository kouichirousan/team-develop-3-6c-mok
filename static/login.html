<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン - 彦田ブルー（仮名前）</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-page">
    <!-- 背景の波 -->
    <div class="auth-wave" style="bottom:0px"></div>
    <div class="auth-wave" style="bottom:40px;animation-delay:0.5s;opacity:0.7"></div>
    <div class="auth-wave" style="bottom:80px;animation-delay:1s;opacity:0.4"></div>

    <!-- 泳ぐ魚 -->
    <div class="auth-fish" style="top:15%;animation-delay:0s">🐠</div>
    <div class="auth-fish" style="top:35%;animation-delay:3s">🐠</div>
    <div class="auth-fish" style="top:55%;animation-delay:6s">🐠</div>
    <div class="auth-fish" style="top:70%;animation-delay:9s">🐠</div>
    <div class="auth-fish" style="top:25%;animation-delay:12s">🐠</div>

    <div style="width:100%;max-width:28rem;position:relative;z-index:10" class="animate-on-load">
      <!-- ロゴ -->
      <div class="auth-logo">
        <div class="wave-icon">🌊</div>
        <h1>彦田ブルー（仮名前）</h1>
        <p>オフィスの海へようこそ 🌊</p>
      </div>

      <!-- フォーム -->
      <div class="auth-form-card">
        <h2 style="font-size:1.5rem;font-weight:700;color:var(--ocean-deep);margin-bottom:1.5rem">ログイン</h2>

        <div class="space-y-6">
          <!-- メールアドレス -->
          <div>
            <label style="display:block;font-size:0.875rem;font-weight:600;color:var(--ocean-deep);margin-bottom:0.5rem">メールアドレス</label>
            <div style="position:relative">
              <span style="position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:var(--ocean-medium)">✉️</span>
              <input type="email" id="email" placeholder="your@email.com" class="input-ocean input-with-icon">
            </div>
          </div>

          <!-- パスワード -->
          <div>
            <label style="display:block;font-size:0.875rem;font-weight:600;color:var(--ocean-deep);margin-bottom:0.5rem">パスワード</label>
            <div style="position:relative">
              <span style="position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:var(--ocean-medium)">🔒</span>
              <input type="password" id="password" placeholder="••••••••" class="input-ocean input-with-icon">
            </div>
          </div>

          <!-- 管理者ログインボタン -->
          <button class="btn-coral w-full" id="adminLoginBtn" onclick="handleLogin('admin')">
            <span>👑 管理者でログイン</span>
          </button>

          <!-- 従業員ログインボタン -->
          <button class="btn-ocean w-full" id="employeeLoginBtn" onclick="handleLogin('employee')">
            <span>👤 従業員でログイン</span>
          </button>
        </div>

        <!-- 新規登録リンク -->
        <div style="margin-top:1.5rem;text-align:center">
          <p style="font-size:0.875rem;color:var(--gray-600)">アカウントをお持ちでない方は</p>
          <a href="register.html" style="margin-top:0.5rem;display:inline-block;color:var(--ocean-medium);font-weight:600;transition:color 0.2s">
            新規登録はこちら →
          </a>
        </div>
      </div>

      <!-- デモモード注意書き -->
      <div style="margin-top:1.5rem;text-align:center">
        <div class="mock-badge">🎮 モックアップモード</div>
        <p style="font-size:0.875rem;color:var(--ocean-medium);margin-top:0.5rem">
          任意のメールアドレスとパスワードでログインできます
        </p>
      </div>
    </div>
  </div>

  <script>
    function handleLogin(role) {
      const btn = role === 'admin' ? document.getElementById('adminLoginBtn') : document.getElementById('employeeLoginBtn');
      const origText = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner" style="font-size:1.5rem">🌊</span> ログイン中...';

      setTimeout(() => {
        localStorage.setItem('userRole', role);
        window.location.href = 'home.html';
      }, 1000);
    }
  </script>
</body>
</html>
