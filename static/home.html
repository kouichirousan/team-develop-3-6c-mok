<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ホーム - 彦田ブルー（仮名前）</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-layout">
    <div class="main-content">
      <div class="max-w-6xl mx-auto space-y-8">
        <!-- ヘッダー -->
        <div class="animate-on-load">
          <div class="flex items-center justify-between flex-wrap gap-4">
            <div>
              <h1 class="text-4xl font-bold">おはようございます！🌊</h1>
              <p class="text-gray-600 mt-1">田中太郎さん（開発部）</p>
            </div>
            <div style="padding:0.75rem 1.5rem;background:rgba(255,255,255,0.9);border-radius:1rem;border:3px solid var(--ocean-deep);font-size:1.5rem;font-weight:700;color:var(--ocean-deep)" id="clock"></div>
          </div>
        </div>

        <!-- メインコンテンツ: チェックイン + ヒートマップ -->
        <div class="grid grid-cols-1 md-grid-cols-2 gap-6">
          <!-- チェックインボタン -->
          <div class="animate-on-load" style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem">
            <button class="checkin-btn checkout" id="checkinBtn" onclick="handleCheckin()">
              <span class="icon" id="checkinIcon">☀️</span>
              <span class="label" id="checkinLabel">Check In</span>
              <span class="sublabel" id="checkinSub">Good Morning! 🌊</span>
            </button>
            <div class="checkin-message" id="checkinMessage"></div>
          </div>

          <!-- オーシャンヒートマップ -->
          <div class="animate-on-load">
            <div class="ocean-heatmap" id="oceanHeatmap"></div>
          </div>
        </div>

        <!-- アクティビティログ -->
        <div class="animate-on-load card-ocean" style="background:rgba(255,255,255,0.9)">
          <div class="flex items-center gap-2 mb-4">
            <span style="font-size:1.25rem">📋</span>
            <h3 class="font-bold text-xl">アクティビティログ</h3>
          </div>
          <div class="activity-log" id="activityLog">
            <div class="activity-item"><span>📍</span><span>システム起動</span></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- バッジ獲得モーダル -->
  <div class="badge-modal-overlay" id="badgeModal">
    <div class="badge-modal">
      <div style="font-size:4rem;margin-bottom:1rem">🏆</div>
      <h2 class="text-2xl font-bold mb-2">称号獲得！</h2>
      <p class="badge-modal-name font-semibold" style="color:var(--primary)">早起き鳥 (Silver)</p>
    </div>
  </div>

  <script src="js/common.js"></script>
  <script>
    if (!checkAuth()) { /* redirected */ }

    // サイドバー
    renderSidebar('home');

    // 状態
    let isCheckedIn = false;
    let checkedInCount = 12;
    const capacity = 50;

    // 時計
    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent =
        now.getHours().toString().padStart(2,'0') + ':' +
        now.getMinutes().toString().padStart(2,'0') + ':' +
        now.getSeconds().toString().padStart(2,'0');
    }
    updateClock();
    setInterval(updateClock, 1000);

    // ヒートマップ初期化
    renderOceanHeatmap('oceanHeatmap', checkedInCount, capacity);

    // チェックイン
    function handleCheckin() {
      isCheckedIn = !isCheckedIn;
      const btn = document.getElementById('checkinBtn');
      const icon = document.getElementById('checkinIcon');
      const label = document.getElementById('checkinLabel');
      const sub = document.getElementById('checkinSub');
      const msg = document.getElementById('checkinMessage');

      if (isCheckedIn) {
        btn.classList.remove('checkout');
        btn.classList.add('checked-in');
        icon.textContent = '🌙';
        label.textContent = 'Check Out';
        sub.textContent = 'お疲れ様！🌙';
        checkedInCount++;
        msg.textContent = 'チェックインしました！🌊';
        addLog('✅ チェックインしました');
      } else {
        btn.classList.remove('checked-in');
        btn.classList.add('checkout');
        icon.textContent = '☀️';
        label.textContent = 'Check In';
        sub.textContent = 'Good Morning! 🌊';
        checkedInCount--;
        msg.textContent = 'チェックアウトしました！お疲れ様 🌙';
        addLog('👋 チェックアウトしました');
      }

      msg.classList.add('show');
      setTimeout(() => msg.classList.remove('show'), 3000);

      renderOceanHeatmap('oceanHeatmap', checkedInCount, capacity);

      // Haptic
      if (navigator.vibrate) navigator.vibrate(50);
    }

    // ログ追加
    function addLog(message) {
      const log = document.getElementById('activityLog');
      const time = new Date().toLocaleTimeString('ja-JP');
      const item = document.createElement('div');
      item.className = 'activity-item';
      item.innerHTML = `<span style="font-size:0.75rem;color:var(--gray-400)">${time}</span><span>${message}</span>`;
      log.insertBefore(item, log.firstChild);
    }
  </script>
</body>
</html>
