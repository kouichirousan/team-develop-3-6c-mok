<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ランチマッチング - 彦田ブルー（仮名前）</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-layout">
    <div class="main-content">
      <div class="max-w-6xl mx-auto space-y-8">
        <!-- ヘッダー -->
        <div class="animate-on-load">
          <h1 class="text-4xl font-bold mb-2">ランチマッチング</h1>
          <p class="text-gray-600">社内交流を促進しよう</p>
        </div>

        <!-- フードファイター進捗 -->
        <div class="animate-on-load card-gradient-hot">
          <div class="flex items-center justify-between mb-4">
            <div>
              <h2 class="text-2xl font-bold">フードファイター進捗</h2>
              <p style="opacity:0.9">異なる部署の5人とランチ</p>
            </div>
            <div style="font-size:3rem">🍱</div>
          </div>
          <div class="lunch-progress mb-2">
            <div class="lunch-progress-step done"></div>
            <div class="lunch-progress-step done"></div>
            <div class="lunch-progress-step done"></div>
            <div class="lunch-progress-step undone"></div>
            <div class="lunch-progress-step undone"></div>
          </div>
          <p class="text-right font-bold">3 / 5 達成</p>
        </div>

        <!-- ランチ招待 -->
        <div class="animate-on-load card">
          <div class="flex items-center gap-3 mb-4">
            <span style="font-size:2rem;color:var(--accent)">🕐</span>
            <h2 class="text-2xl font-bold">ランチ招待</h2>
          </div>
          <div class="space-y-3">
            <div class="lunch-request-card">
              <div>
                <h3 class="font-bold text-lg">佐藤花子</h3>
                <p class="text-sm text-gray-600">2024-02-27</p>
              </div>
              <div class="flex gap-2">
                <button class="lunch-accept-btn" onclick="this.closest('.lunch-request-card').remove()">✓</button>
                <button class="lunch-reject-btn" onclick="this.closest('.lunch-request-card').remove()">✕</button>
              </div>
            </div>
            <div class="lunch-request-card">
              <div>
                <h3 class="font-bold text-lg">高橋美咲</h3>
                <p class="text-sm text-gray-600">2024-02-28</p>
              </div>
              <div class="flex gap-2">
                <button class="lunch-accept-btn" onclick="this.closest('.lunch-request-card').remove()">✓</button>
                <button class="lunch-reject-btn" onclick="this.closest('.lunch-request-card').remove()">✕</button>
              </div>
            </div>
          </div>
        </div>

        <!-- ランチに誘う -->
        <div class="animate-on-load card">
          <div class="flex items-center gap-3 mb-4">
            <span style="font-size:2rem;color:var(--primary)">📨</span>
            <h2 class="text-2xl font-bold">ランチに誘う</h2>
          </div>
          <div class="grid grid-cols-1 md-grid-cols-2 gap-4">
            <div class="invite-card">
              <div class="flex items-center gap-3">
                <div class="invite-avatar">佐</div>
                <div>
                  <h3 class="font-bold">佐藤花子</h3>
                  <p class="text-sm text-gray-600">デザイン部</p>
                </div>
              </div>
              <button class="btn-accent">招待</button>
            </div>
            <div class="invite-card">
              <div class="flex items-center gap-3">
                <div class="invite-avatar">鈴</div>
                <div>
                  <h3 class="font-bold">鈴木一郎</h3>
                  <p class="text-sm text-gray-600">営業部</p>
                </div>
              </div>
              <button class="btn-accent">招待</button>
            </div>
            <div class="invite-card">
              <div class="flex items-center gap-3">
                <div class="invite-avatar">高</div>
                <div>
                  <h3 class="font-bold">高橋美咲</h3>
                  <p class="text-sm text-gray-600">マーケティング部</p>
                </div>
              </div>
              <button class="btn-accent">招待</button>
            </div>
            <div class="invite-card">
              <div class="flex items-center gap-3">
                <div class="invite-avatar">山</div>
                <div>
                  <h3 class="font-bold">山田健太</h3>
                  <p class="text-sm text-gray-600">開発部</p>
                </div>
              </div>
              <button class="btn-accent">招待</button>
            </div>
          </div>
        </div>

        <!-- ランチ履歴 -->
        <div class="animate-on-load card">
          <div class="flex items-center gap-3 mb-4">
            <span style="font-size:2rem;color:var(--vibe-hot)">🍽️</span>
            <h2 class="text-2xl font-bold">ランチ履歴</h2>
          </div>
          <div class="space-y-3">
            <div class="invite-card">
              <div>
                <h3 class="font-bold">佐藤花子</h3>
                <p class="text-sm text-gray-600">デザイン部</p>
              </div>
              <div class="text-right">
                <p class="text-sm text-gray-600">2024-02-26</p>
                <span style="color:var(--green-600);font-weight:600">✓ 完了</span>
              </div>
            </div>
            <div class="invite-card">
              <div>
                <h3 class="font-bold">鈴木一郎</h3>
                <p class="text-sm text-gray-600">営業部</p>
              </div>
              <div class="text-right">
                <p class="text-sm text-gray-600">2024-02-25</p>
                <span style="color:var(--green-600);font-weight:600">✓ 完了</span>
              </div>
            </div>
            <div class="invite-card">
              <div>
                <h3 class="font-bold">山田健太</h3>
                <p class="text-sm text-gray-600">開発部</p>
              </div>
              <div class="text-right">
                <p class="text-sm text-gray-600">2024-02-24</p>
                <span style="color:var(--green-600);font-weight:600">✓ 完了</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/common.js"></script>
  <script>
    if (!checkAuth()) { /* redirected */ }
    renderSidebar('lunch');
  </script>
</body>
</html>
