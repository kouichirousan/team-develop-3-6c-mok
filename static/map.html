<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>オフィスマップ - 彦田ブルー（仮名前）</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-layout">
    <div class="main-content">
      <div class="max-w-7xl mx-auto space-y-8">
        <!-- ヘッダー -->
        <div class="animate-on-load">
          <h1 class="text-4xl font-bold mb-2">オフィスマップ</h1>
          <p class="text-gray-600">誰がオフィスにいるか確認</p>
        </div>

        <!-- 統計 -->
        <div class="animate-on-load card-gradient-ocean">
          <p style="font-size:0.875rem;opacity:0.9;margin-bottom:0.25rem">出社中</p>
          <p class="text-5xl font-bold" id="totalCount">12</p>
          <p style="font-size:0.875rem;opacity:0.9;margin-top:0.25rem">人</p>
        </div>

        <!-- 検索・フィルター -->
        <div class="animate-on-load card-ocean">
          <div class="flex items-center gap-3 mb-4">
            <span style="color:var(--ocean-medium);font-size:1.5rem">🔍</span>
            <h2 class="text-xl font-bold">検索・絞り込み</h2>
          </div>
          <div class="space-y-4">
            <div style="position:relative">
              <span style="position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:var(--gray-400)">🔍</span>
              <input type="text" id="searchInput" placeholder="名前、部署、座席番号で検索..." class="input-ocean input-with-icon" oninput="filterPeople()">
            </div>
            <div>
              <label style="display:block;font-size:0.875rem;font-weight:600;color:var(--ocean-deep);margin-bottom:0.5rem">部署</label>
              <select id="deptFilter" class="input-ocean" onchange="filterPeople()">
                <option value="all">すべて</option>
                <option value="開発部">開発部</option>
                <option value="デザイン部">デザイン部</option>
                <option value="営業部">営業部</option>
                <option value="人事部">人事部</option>
                <option value="経営企画部">経営企画部</option>
              </select>
            </div>
          </div>
        </div>

        <!-- 部署別サマリー -->
        <div class="animate-on-load card-ocean">
          <div class="flex items-center gap-3 mb-4">
            <span style="color:var(--ocean-medium);font-size:1.5rem">👥</span>
            <h2 class="text-xl font-bold">部署別出社状況</h2>
          </div>
          <div class="grid grid-cols-2 md-grid-cols-5 gap-3" id="deptSummary"></div>
        </div>

        <!-- メンバーリスト -->
        <div class="animate-on-load card-ocean">
          <div class="flex items-center justify-between mb-6">
            <div class="flex items-center gap-3">
              <span style="color:var(--ocean-medium);font-size:2rem">👥</span>
              <h2 class="text-2xl font-bold">出社中のメンバー</h2>
            </div>
            <span class="text-lg font-semibold text-ocean-deep" id="filteredCount">12人</span>
          </div>
          <div class="grid grid-cols-1 md-grid-cols-2 lg-grid-cols-3 gap-4" id="peopleGrid"></div>
          <div id="emptyMessage" style="display:none;text-align:center;padding:3rem;color:var(--gray-400)">
            <p class="text-lg">該当するメンバーが見つかりません</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/common.js"></script>
  <script>
    if (!checkAuth()) { /* redirected */ }
    renderSidebar('map');

    const people = [
      { id: 1, name: '田中太郎', department: '開発部', checkedInAt: '09:00', location: '1F-A12' },
      { id: 2, name: '佐藤花子', department: 'デザイン部', checkedInAt: '08:45', location: '1F-B05' },
      { id: 3, name: '鈴木一郎', department: '営業部', checkedInAt: '09:15', location: '2F-C08' },
      { id: 4, name: '高橋美咲', department: 'デザイン部', checkedInAt: '08:30', location: '1F-B06' },
      { id: 5, name: '山田健太', department: '開発部', checkedInAt: '09:30', location: '1F-A15' },
      { id: 6, name: '伊藤真理', department: '人事部', checkedInAt: '09:00', location: '2F-D02' },
      { id: 7, name: '渡辺誠', department: '開発部', checkedInAt: '10:00', location: '1F-A18' },
      { id: 8, name: '中村由美', department: '営業部', checkedInAt: '08:50', location: '2F-C12' },
      { id: 9, name: '小林大輔', department: '経営企画部', checkedInAt: '09:20', location: '3F-E01' },
      { id: 10, name: '加藤愛', department: 'デザイン部', checkedInAt: '09:45', location: '1F-B08' },
      { id: 11, name: '吉田拓也', department: '開発部', checkedInAt: '08:40', location: '1F-A20' },
      { id: 12, name: '松本さくら', department: '人事部', checkedInAt: '09:10', location: '2F-D05' },
    ];

    // 部署サマリー
    function renderDeptSummary() {
      const depts = ['開発部', 'デザイン部', '営業部', '人事部', '経営企画部'];
      const counts = {};
      people.forEach(p => { counts[p.department] = (counts[p.department] || 0) + 1; });
      const container = document.getElementById('deptSummary');
      container.innerHTML = depts.map(dept => `
        <div class="dept-summary-card">
          <p style="font-size:0.875rem;color:var(--gray-600);margin-bottom:0.25rem">${dept}</p>
          <p class="dept-count">${counts[dept] || 0}</p>
          <p style="font-size:0.75rem;color:var(--gray-600);margin-top:0.25rem">人</p>
        </div>
      `).join('');
    }

    // メンバーリスト
    function filterPeople() {
      const query = document.getElementById('searchInput').value.toLowerCase();
      const dept = document.getElementById('deptFilter').value;

      const filtered = people.filter(p => {
        const matchSearch = p.name.toLowerCase().includes(query) ||
                            p.department.includes(query) ||
                            p.location.includes(query);
        const matchDept = dept === 'all' || p.department === dept;
        return matchSearch && matchDept;
      });

      document.getElementById('filteredCount').textContent = filtered.length + '人';

      const grid = document.getElementById('peopleGrid');
      const empty = document.getElementById('emptyMessage');

      if (filtered.length === 0) {
        grid.innerHTML = '';
        empty.style.display = 'block';
      } else {
        empty.style.display = 'none';
        grid.innerHTML = filtered.map(p => `
          <div class="person-card">
            <div class="flex items-start justify-between mb-3">
              <div class="flex items-center gap-3">
                <div class="person-avatar">${p.name[0]}</div>
                <div>
                  <h3 class="font-bold text-lg">${p.name}</h3>
                  <p class="text-sm text-gray-600">${p.department}</p>
                </div>
              </div>
            </div>
            <div class="flex items-center justify-between" style="font-size:0.875rem">
              <div class="flex items-center gap-1 text-gray-600">
                <span>🕐</span>
                <span>${p.checkedInAt}</span>
              </div>
              <div class="font-semibold text-ocean-deep">📍 ${p.location}</div>
            </div>
          </div>
        `).join('');
      }
    }

    renderDeptSummary();
    filterPeople();
  </script>
</body>
</html>
