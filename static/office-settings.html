<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>オフィス設定 - 彦田ブルー（仮名前）</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-layout" id="appContent" style="display:none">
    <div class="main-content">
      <div style="padding:2rem" class="space-y-8">
        <!-- ヘッダー -->
        <div class="animate-on-load">
          <div class="flex items-center gap-3 mb-2">
            <span style="color:var(--coral-orange);font-size:2.5rem">🛡️</span>
            <h1 class="text-4xl font-bold">オフィス設定</h1>
          </div>
          <p class="text-gray-600">管理者専用ページ - オフィス全体の設定を管理</p>
        </div>

        <!-- 管理者バッジ -->
        <div class="animate-on-load">
          <div class="admin-badge">👑 管理者専用</div>
        </div>

        <!-- オフィス基本情報 -->
        <div class="animate-on-load card-ocean">
          <div class="flex items-center gap-3 mb-6">
            <span style="color:var(--ocean-medium);font-size:2rem">🏢</span>
            <h2 class="text-2xl font-bold">オフィス基本情報</h2>
          </div>
          <div class="space-y-4">
            <div>
              <label style="display:block;font-size:0.875rem;font-weight:600;color:var(--ocean-deep);margin-bottom:0.5rem">オフィス名</label>
              <input type="text" value="東京本社オフィス" class="input-ocean">
            </div>
            <div>
              <label style="display:block;font-size:0.875rem;font-weight:600;color:var(--ocean-deep);margin-bottom:0.5rem">住所</label>
              <input type="text" value="東京都渋谷区〇〇 1-2-3" class="input-ocean">
            </div>
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label style="display:block;font-size:0.875rem;font-weight:600;color:var(--ocean-deep);margin-bottom:0.5rem">総座席数</label>
                <input type="number" value="50" class="input-ocean">
              </div>
              <div>
                <label style="display:block;font-size:0.875rem;font-weight:600;color:var(--ocean-deep);margin-bottom:0.5rem">フロア数</label>
                <input type="number" value="3" class="input-ocean">
              </div>
            </div>
          </div>
        </div>

        <!-- 従業員数設定 -->
        <div class="animate-on-load card-ocean">
          <div class="flex items-center gap-3 mb-6">
            <span style="color:var(--ocean-medium);font-size:2rem">👥</span>
            <h2 class="text-2xl font-bold">従業員数設定</h2>
          </div>
          <div>
            <label style="display:block;font-size:0.875rem;font-weight:600;color:var(--ocean-deep);margin-bottom:0.5rem">総従業員数</label>
            <input type="number" value="30" class="input-ocean">
            <p class="text-sm text-gray-600 mt-2">現在登録されている従業員数を設定します</p>
          </div>
        </div>

        <!-- 勤務時間設定 -->
        <div class="animate-on-load card-ocean">
          <div class="flex items-center gap-3 mb-6">
            <span style="color:var(--ocean-medium);font-size:2rem">🕐</span>
            <h2 class="text-2xl font-bold">勤務時間設定</h2>
          </div>
          <div class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label style="display:block;font-size:0.875rem;font-weight:600;color:var(--ocean-deep);margin-bottom:0.5rem">標準出社時刻</label>
                <input type="time" value="09:00" class="input-ocean">
              </div>
              <div>
                <label style="display:block;font-size:0.875rem;font-weight:600;color:var(--ocean-deep);margin-bottom:0.5rem">標準退社時刻</label>
                <input type="time" value="18:00" class="input-ocean">
              </div>
            </div>
            <div>
              <label style="display:block;font-size:0.875rem;font-weight:600;color:var(--ocean-deep);margin-bottom:0.5rem">早起き鳥ボーナス時刻（この時刻より前のチェックインでボーナス）</label>
              <input type="time" value="08:00" class="input-ocean">
            </div>
          </div>
        </div>

        <!-- 部署管理 -->
        <div class="animate-on-load card-ocean">
          <div class="flex items-center gap-3 mb-6">
            <span style="color:var(--ocean-medium);font-size:2rem">👥</span>
            <h2 class="text-2xl font-bold">部署管理</h2>
          </div>
          <div class="space-y-3">
            <div class="dept-item"><span class="font-semibold">開発部</span><div class="flex gap-2"><button class="dept-btn-edit">編集</button><button class="dept-btn-delete">削除</button></div></div>
            <div class="dept-item"><span class="font-semibold">デザイン部</span><div class="flex gap-2"><button class="dept-btn-edit">編集</button><button class="dept-btn-delete">削除</button></div></div>
            <div class="dept-item"><span class="font-semibold">営業部</span><div class="flex gap-2"><button class="dept-btn-edit">編集</button><button class="dept-btn-delete">削除</button></div></div>
            <div class="dept-item"><span class="font-semibold">人事部</span><div class="flex gap-2"><button class="dept-btn-edit">編集</button><button class="dept-btn-delete">削除</button></div></div>
            <div class="dept-item"><span class="font-semibold">経営企画部</span><div class="flex gap-2"><button class="dept-btn-edit">編集</button><button class="dept-btn-delete">削除</button></div></div>
            <button class="add-dept-btn">+ 新しい部署を追加</button>
          </div>
        </div>

        <!-- エリア・座席設定 -->
        <div class="animate-on-load card-ocean">
          <div class="flex items-center gap-3 mb-6">
            <span style="color:var(--ocean-medium);font-size:2rem">📍</span>
            <h2 class="text-2xl font-bold">エリア・座席設定</h2>
          </div>
          <div class="space-y-3">
            <div class="area-card special">
              <div>
                <span class="font-semibold">窓際VIP席</span>
                <span class="area-tag">特権席</span>
                <p class="text-sm text-gray-600 mt-1">5席</p>
              </div>
              <button class="dept-btn-edit">編集</button>
            </div>
            <div class="area-card special">
              <div>
                <span class="font-semibold">集中ブース</span>
                <span class="area-tag">特権席</span>
                <p class="text-sm text-gray-600 mt-1">8席</p>
              </div>
              <button class="dept-btn-edit">編集</button>
            </div>
            <div class="area-card">
              <div>
                <span class="font-semibold">一般デスク</span>
                <p class="text-sm text-gray-600 mt-1">30席</p>
              </div>
              <button class="dept-btn-edit">編集</button>
            </div>
            <div class="area-card">
              <div>
                <span class="font-semibold">会議室</span>
                <p class="text-sm text-gray-600 mt-1">7席</p>
              </div>
              <button class="dept-btn-edit">編集</button>
            </div>
          </div>
        </div>

        <!-- 保存ボタン -->
        <div class="animate-on-load flex justify-between gap-4" style="justify-content:flex-end">
          <button style="padding:1rem 2rem;background:var(--gray-200);color:var(--gray-700);font-weight:700;border-radius:0.75rem;border:4px solid var(--gray-400);cursor:pointer;transition:background 0.2s" onmouseover="this.style.background='var(--gray-300)'" onmouseout="this.style.background='var(--gray-200)'">キャンセル</button>
          <button class="btn-ocean">変更を保存</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ローディング -->
  <div class="loading-screen" id="loadingScreen">
    <div class="spinner">🌊</div>
  </div>

  <script src="js/common.js"></script>
  <script>
    if (!checkAdmin()) { /* redirected */ }

    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('appContent').style.display = 'flex';
    renderSidebar('office-settings');
  </script>
</body>
</html>
