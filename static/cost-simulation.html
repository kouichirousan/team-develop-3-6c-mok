<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>コストシミュレーション - 彦田ブルー（仮名前）</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-layout" id="appContent" style="display:none">
    <div class="main-content">
      <div style="padding:2rem" class="space-y-8">
        <!-- ヘッダー -->
        <div class="animate-on-load">
          <div class="flex items-center gap-3 mb-2">
            <span style="color:var(--coral-orange);font-size:2.5rem">🧮</span>
            <h1 class="text-4xl font-bold">コストシミュレーション</h1>
          </div>
          <p class="text-gray-600">オフィスコストの最適化を検討</p>
        </div>

        <!-- 管理者バッジ -->
        <div class="animate-on-load">
          <div class="admin-badge">👑 管理者専用</div>
        </div>

        <!-- モード切替 -->
        <div class="animate-on-load flex gap-4 justify-center" style="justify-content:center">
          <button class="sim-mode-btn active" id="modeArea" onclick="switchMode('area')">📐 面積からコストを計算</button>
          <button class="sim-mode-btn" id="modeCost" onclick="switchMode('cost')">💰 コストから面積を計算</button>
        </div>

        <div class="max-w-4xl mx-auto space-y-8">
          <!-- AI推奨値 -->
          <div class="animate-on-load ai-card">
            <div class="flex items-center gap-3 mb-4">
              <span style="font-size:2rem;color:var(--accent)">✨</span>
              <h2 class="text-2xl font-bold">AI推奨値</h2>
            </div>
            <div class="grid grid-cols-1 md-grid-cols-3 gap-4 mb-4">
              <div class="ai-value-card">
                <p class="text-sm text-gray-600 mb-1">出社率 <span id="aiRate">60</span>%</p>
                <p class="text-2xl font-bold" id="aiSeats">22席</p>
                <p class="text-xs text-gray-600">（20%バッファ込み）</p>
              </div>
              <div class="ai-value-card">
                <p class="text-sm text-gray-600 mb-1">推奨面積</p>
                <p class="text-2xl font-bold" id="aiArea">77坪</p>
                <p class="text-xs text-gray-600" id="aiAreaM2">（254.1㎡）</p>
              </div>
              <div class="ai-value-card">
                <p class="text-sm text-gray-600 mb-1">推奨コスト</p>
                <p class="text-2xl font-bold" id="aiCost">¥193万</p>
                <p class="text-xs text-gray-600">/月</p>
              </div>
            </div>
            <button onclick="applyRecommendation()" style="width:100%;padding:0.75rem;background:var(--accent);color:var(--ocean-deep);font-weight:700;font-size:1.125rem;border-radius:0.75rem;border:4px solid var(--ocean-deep);cursor:pointer;transition:all 0.2s" onmouseover="this.style.boxShadow='4px 4px 0px 0px rgba(0,61,92,0.5)'" onmouseout="this.style.boxShadow='none'">
              ✨ 推奨値をバーに反映
            </button>
          </div>

          <!-- シミュレーション設定 -->
          <div class="animate-on-load card-ocean">
            <div class="flex items-center gap-3 mb-8">
              <span style="color:var(--ocean-medium);font-size:2rem">🏢</span>
              <h2 class="text-2xl font-bold">シミュレーション設定</h2>
            </div>

            <div class="space-y-8">
              <!-- 出社率 -->
              <div>
                <label style="display:block;font-size:1.125rem;font-weight:700;color:var(--ocean-deep);margin-bottom:0.75rem">
                  想定出社率: <span id="rateLabel">60</span>%
                </label>
                <input type="range" min="20" max="100" step="5" value="60" class="range-slider" id="rateSlider" oninput="updateSimulation()">
                <div class="flex justify-between text-sm text-gray-600 mt-2">
                  <span>20%</span><span>60%</span><span>100%</span>
                </div>
              </div>

              <!-- 坪単価 -->
              <div>
                <label style="display:block;font-size:1.125rem;font-weight:700;color:var(--ocean-deep);margin-bottom:0.75rem">
                  坪単価: ¥<span id="costPerTsuboLabel">25,000</span>/坪/月
                </label>
                <input type="range" min="10000" max="40000" step="1000" value="25000" class="range-slider" id="costPerTsuboSlider" oninput="updateSimulation()">
                <div class="flex justify-between text-sm text-gray-600 mt-2">
                  <span>¥10,000</span><span>¥25,000</span><span>¥40,000</span>
                </div>
              </div>

              <div style="border-top:4px solid var(--ocean-light);padding-top:2rem">
                <!-- 面積モード -->
                <div id="areaMode">
                  <label style="display:block;font-size:1.125rem;font-weight:700;color:var(--ocean-deep);margin-bottom:0.75rem">
                    目標面積: <span id="areaLabel">160</span>坪
                  </label>
                  <input type="range" min="80" max="300" step="10" value="160" class="range-slider range-slider-lg" id="areaSlider" oninput="updateSimulation()">
                  <div class="flex justify-between text-sm text-gray-600 mt-2">
                    <span>80坪</span><span>190坪</span><span>300坪</span>
                  </div>
                  <p class="text-sm text-gray-600 mt-2" id="areaM2">(528.0㎡)</p>
                  <div class="sim-result">
                    <p style="font-size:0.875rem;opacity:0.9;margin-bottom:0.5rem">計算されるコスト</p>
                    <p class="result-value" id="calcCost">¥400万</p>
                    <p style="font-size:1.125rem;margin-top:0.5rem">/月</p>
                    <p style="font-size:0.875rem;opacity:0.9;margin-top:0.75rem" id="calcCostYear">年間: ¥4,800万</p>
                  </div>
                </div>

                <!-- コストモード -->
                <div id="costMode" style="display:none">
                  <label style="display:block;font-size:1.125rem;font-weight:700;color:var(--ocean-deep);margin-bottom:0.75rem">
                    目標月額コスト: ¥<span id="targetCostLabel">400</span>万
                  </label>
                  <input type="range" min="2000000" max="8000000" step="100000" value="4000000" class="range-slider range-slider-lg" id="targetCostSlider" oninput="updateSimulation()">
                  <div class="flex justify-between text-sm text-gray-600 mt-2">
                    <span>¥200万</span><span>¥500万</span><span>¥800万</span>
                  </div>
                  <div class="sim-result">
                    <p style="font-size:0.875rem;opacity:0.9;margin-bottom:0.5rem">計算される面積</p>
                    <p class="result-value" id="calcArea">160坪</p>
                    <p style="font-size:0.875rem;opacity:0.9;margin-top:0.75rem" id="calcAreaM2">(528.0㎡)</p>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ローディング -->
  <div class="loading-screen" id="loadingScreen">
    <div class="spinner">🌊</div>
  </div>

  <script src="js/common.js"></script>
  <script>
    if (!checkAdmin()) { /* redirected */ }

    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('appContent').style.display = 'flex';
    renderSidebar('cost-simulation');

    let simMode = 'area';
    const totalEmployees = 30;

    function switchMode(mode) {
      simMode = mode;
      document.getElementById('modeArea').className = 'sim-mode-btn' + (mode === 'area' ? ' active' : '');
      document.getElementById('modeCost').className = 'sim-mode-btn' + (mode === 'cost' ? ' active' : '');
      document.getElementById('areaMode').style.display = mode === 'area' ? 'block' : 'none';
      document.getElementById('costMode').style.display = mode === 'cost' ? 'block' : 'none';
      updateSimulation();
    }

    function updateSimulation() {
      const rate = parseInt(document.getElementById('rateSlider').value);
      const costPerTsubo = parseInt(document.getElementById('costPerTsuboSlider').value);

      document.getElementById('rateLabel').textContent = rate;
      document.getElementById('costPerTsuboLabel').textContent = costPerTsubo.toLocaleString();

      // スライダーの背景色更新
      updateSliderBg('rateSlider', (rate - 20) / 80 * 100);
      updateSliderBg('costPerTsuboSlider', (costPerTsubo - 10000) / 30000 * 100);

      // AI推奨値
      const recSeats = Math.ceil(totalEmployees * (rate / 100) * 1.2);
      const recArea = Math.ceil(recSeats * 3.5);
      const recCost = recArea * costPerTsubo;

      document.getElementById('aiRate').textContent = rate;
      document.getElementById('aiSeats').textContent = recSeats + '席';
      document.getElementById('aiArea').textContent = recArea + '坪';
      document.getElementById('aiAreaM2').textContent = '（' + (recArea * 3.3).toFixed(1) + '㎡）';
      document.getElementById('aiCost').textContent = '¥' + Math.round(recCost / 10000) + '万';

      if (simMode === 'area') {
        const area = parseInt(document.getElementById('areaSlider').value);
        document.getElementById('areaLabel').textContent = area;
        document.getElementById('areaM2').textContent = '(' + (area * 3.3).toFixed(1) + '㎡)';
        const cost = area * costPerTsubo;
        document.getElementById('calcCost').textContent = '¥' + Math.round(cost / 10000) + '万';
        document.getElementById('calcCostYear').textContent = '年間: ¥' + Math.round(cost * 12 / 10000) + '万';
        updateSliderBg('areaSlider', (area - 80) / 220 * 100);
      } else {
        const targetCost = parseInt(document.getElementById('targetCostSlider').value);
        document.getElementById('targetCostLabel').textContent = Math.round(targetCost / 10000);
        const calcArea = Math.floor(targetCost / costPerTsubo);
        document.getElementById('calcArea').textContent = calcArea + '坪';
        document.getElementById('calcAreaM2').textContent = '(' + (calcArea * 3.3).toFixed(1) + '㎡)';
        updateSliderBg('targetCostSlider', (targetCost - 2000000) / 6000000 * 100);
      }
    }

    function updateSliderBg(id, percent) {
      const slider = document.getElementById(id);
      slider.style.background = `linear-gradient(to right, #0891b2 0%, #0891b2 ${percent}%, #e0f2fe ${percent}%, #e0f2fe 100%)`;
    }

    function applyRecommendation() {
      const rate = parseInt(document.getElementById('rateSlider').value);
      const costPerTsubo = parseInt(document.getElementById('costPerTsuboSlider').value);
      const recSeats = Math.ceil(totalEmployees * (rate / 100) * 1.2);
      const recArea = Math.ceil(recSeats * 3.5);
      const recCost = recArea * costPerTsubo;

      if (simMode === 'area') {
        document.getElementById('areaSlider').value = recArea;
      } else {
        document.getElementById('targetCostSlider').value = recCost;
      }
      updateSimulation();
    }

    updateSimulation();
  </script>
</body>
</html>
